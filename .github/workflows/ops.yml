name: Ops

on:
  schedule:
    - cron: '15 6 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  packages: write
  security-events: write
  attestations: write
  id-token: write

jobs:
  github-config:
    uses: vergil-project/vergil-actions/.github/workflows/ops-github-config.yml@v2.1
    permissions:
      contents: read
      issues: write
    secrets:
      APP_CLIENT_ID: ${{ secrets.APP_CLIENT_ID }}
      APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}

  nightly-rebuild-dev:
    uses: ./.github/workflows/cd-docker-publish.yml
    with:
      image-prefix: dev
      no-cache: true
    permissions:
      packages: write
      contents: read
      security-events: write
      attestations: write
      id-token: write

  nightly-rebuild-prod:
    uses: ./.github/workflows/cd-docker-publish.yml
    with:
      image-prefix: prod
      no-cache: true
    permissions:
      packages: write
      contents: read
      security-events: write
      attestations: write
      id-token: write
