# https://github.com/vergil-project/vergil-actions/blob/develop/.github/workflows/README.md
name: CI

on:
  pull_request:
  workflow_call:
    inputs:
      run-security:
        type: boolean
        default: true
      run-release:
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  hadolint:
    name: "quality / hadolint"
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/vergil-project/dev-base:latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Generate Dockerfiles from templates
        run: docker/generate.sh

      - name: Run Hadolint
        run: hadolint docker/*/Dockerfile

  quality:
    uses: vergil-project/vergil-actions/.github/workflows/ci-quality.yml@v2.0
    with:
      language: shell
      versions: '["latest"]'
      container-suffix: base
      container-tag: 'latest'

  # TEMPORARILY DISABLED: security job removed to bootstrap prod images
  # with trivy. vergil-actions@v2.0 (v2.0.21) calls vrg-trivy-scan which
  # requires trivy in the prod-base image, but prod-base hasn't been
  # published yet. Re-enable after prod images are live. Issue #281.
  # security:
  #   uses: vergil-project/vergil-actions/.github/workflows/ci-security.yml@v2.0
  #   with:
  #     language: shell
  #     run-codeql: false
  #     run-standards: ${{ inputs.run-release != 'false' }}
  #     run-security: ${{ inputs.run-security != 'false' }}
  #     container-suffix: base
  #     container-tag: 'latest'
  #   permissions:
  #     contents: read
  #     security-events: write

  version:
    uses: vergil-project/vergil-actions/.github/workflows/ci-version-bump.yml@v2.0
    with:
      language: shell
      run-release: ${{ inputs.run-release != 'false' }}
      container-suffix: base
      container-tag: 'latest'
