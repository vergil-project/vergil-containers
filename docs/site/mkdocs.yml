site_name: Vergil Containers
site_description: Docker dev container images for the VERGIL ecosystem
repo_url: https://github.com/vergil-project/vergil-containers
repo_name: vergil-project/vergil-containers

docs_dir: docs
strict: true
edit_uri: ""

extra:
  version:
    provider: mike
extra_css:
  - stylesheets/extra.css

plugins:
  - search

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - content.code.copy
    - search.highlight
    - search.suggest

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Releases:
      - Changelog: changelog.md
      - Release Notes:
          - releases/index.md
  - Images: images/index.md
  - Architecture:
      - architecture/index.md
      - Design Decisions:
          - Multi-Arch Images: architecture/decisions/multi-arch-images.md
          - Release Workflow: architecture/decisions/release-workflow.md
  - Operations:
      - Repository Standards: operations/repository-standards.md
      - Trivy CVE Triage: operations/trivy-triage.md
